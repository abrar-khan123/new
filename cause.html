<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why You're My Best Love! 💖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="./cause.css">
    <style>
       
    </style>
</head>
<body>
    <div class="custom-cursor">
        <svg viewBox="0 0 24 24">
            <path fill="#ff69b4" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <div class="container">
        <h1>Happy Birthday AAKHILA 💖</h1>
        
        <div id="reasons-container"></div>
        
        <button class="shuffle-button">Click Here... 💕</button>
        <div class="reason-counter"></div>

        <div class="ending-section">
            <div class="teddy-hug">
                <img src="./9.jpeg" alt="Teddy Hug">
            </div>
            <div class="ending-text">You're my LOVE ! 💖</div>
        </div>
    </div>

    <script src="cause.js">
       
    </script>
<audio id="bg-music" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>
<button id="music-toggle" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:linear-gradient(45deg,#ff69b4,#da70d6); border:none; border-radius:50%; width:50px; height:50px; font-size:1.3rem; cursor:pointer; box-shadow:0 4px 10px rgba(255,105,180,0.4);">🔇</button>

<script>
    const bgMusic = document.getElementById('bg-music');
    const musicToggle = document.getElementById('music-toggle');
    let isPlaying = false;

    // Restore saved position + state on page load
    window.addEventListener('DOMContentLoaded', () => {
        const savedTime = localStorage.getItem('musicTime');
        const wasPlaying = localStorage.getItem('musicPlaying') === 'true';

        if (savedTime) {
            bgMusic.currentTime = parseFloat(savedTime);
        }

        if (wasPlaying) {
            musicToggle.textContent = '🔊';
            isPlaying = true;
            // Try autoplay immediately (works if browser allows continued interaction)
            bgMusic.play().catch(() => {
                // If blocked, wait for first click to resume
                document.addEventListener('click', () => {
                    bgMusic.play();
                }, { once: true });
            });
        } else {
            musicToggle.textContent = '🔇';
        }
    });

    // Save position continuously while playing
    setInterval(() => {
        if (isPlaying) {
            localStorage.setItem('musicTime', bgMusic.currentTime);
            localStorage.setItem('musicPlaying', 'true');
        }
    }, 500);

    // Manual toggle
    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPlaying) {
            bgMusic.pause();
            musicToggle.textContent = '🔇';
            localStorage.setItem('musicPlaying', 'false');
        } else {
            bgMusic.play();
            musicToggle.textContent = '🔊';
            localStorage.setItem('musicPlaying', 'true');
        }
        isPlaying = !isPlaying;
    });

    // Save state right before navigating away
    window.addEventListener('beforeunload', () => {
        localStorage.setItem('musicTime', bgMusic.currentTime);
        localStorage.setItem('musicPlaying', isPlaying ? 'true' : 'false');
    });
</script>
</body>
</html>
